<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login - Saint Mary School</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #065f46, #059669);
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .school-badge {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            border: 3px solid #059669;
        }

        .login-card h1 {
            font-size: 22px;
            font-weight: 700;
            color: #065f46;
            margin-bottom: 8px;
        }

        .login-card .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            color: #111827;
            background: #f9fafb;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #059669;
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.15);
            background: #ffffff;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #059669;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
            margin-top: 6px;
        }

        .submit-btn:hover {
            background: #047857;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.35);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            box-shadow: none;
        }

        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 18px;
            display: none;
            text-align: left;
        }

        .footer-links {
            margin-top: 24px;
            font-size: 13px;
            color: #6b7280;
        }

        .footer-links a {
            color: #059669;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #047857;
            text-decoration: underline;
        }

        .footer-links .separator {
            margin: 0 10px;
            color: #d1d5db;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .login-card {
                padding: 28px 20px;
            }

            .school-badge {
                width: 72px;
                height: 72px;
            }

            .login-card h1 {
                font-size: 19px;
            }

            .form-group input {
                padding: 10px 14px;
                font-size: 15px;
            }

            .submit-btn {
                padding: 12px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="uploads/school-logo.png" alt="Saint Mary School Badge" class="school-badge">

        <h1>Teacher &amp; Principal Login</h1>
        <p class="subtitle">Saint Mary School</p>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@saintmary.edu" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>

            <div class="error-box" id="errorBox"></div>
        </form>

        <div class="footer-links">
            <a href="/">Back to Home</a>
            <span class="separator">|</span>
            <a href="/admin">Admin? Click here</a>
        </div>
    </div>

    <script>
        (function () {
            var form = document.getElementById('loginForm');
            var emailInput = document.getElementById('email');
            var passwordInput = document.getElementById('password');
            var submitBtn = document.getElementById('submitBtn');
            var errorBox = document.getElementById('errorBox');

            function showError(message) {
                errorBox.textContent = message;
                errorBox.style.display = 'block';
            }

            function hideError() {
                errorBox.textContent = '';
                errorBox.style.display = 'none';
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                hideError();

                var email = emailInput.value.trim();
                var password = passwordInput.value;

                // Basic client-side validation
                if (!email) {
                    showError('Please enter your email address.');
                    emailInput.focus();
                    return;
                }

                if (!password) {
                    showError('Please enter your password.');
                    passwordInput.focus();
                    return;
                }

                // Disable button and show loading state
                submitBtn.disabled = true;
                submitBtn.textContent = 'Signing in...';

                // Send login request
                fetch('/api/auth/user-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email, password: password })
                })
                .then(function (response) {
                    if (response.ok || response.redirected) {
                        // Success — redirect to dashboard
                        window.location.href = '/dashboard';
                    } else {
                        return response.json().then(function (data) {
                            throw new Error(data.message || data.error || 'Login failed. Please check your credentials.');
                        }).catch(function (err) {
                            if (err.message && err.message !== 'Login failed. Please check your credentials.') {
                                throw err;
                            }
                            throw new Error('Login failed. Please check your credentials.');
                        });
                    }
                })
                .catch(function (err) {
                    showError(err.message || 'An unexpected error occurred. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                });
            });

            // Hide error when user starts typing
            emailInput.addEventListener('input', hideError);
            passwordInput.addEventListener('input', hideError);
        })();
    </script>

</body>
</html>
