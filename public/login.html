<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login - Saint Mary School</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #065f46, #059669);
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .school-badge {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            border: 3px solid #059669;
        }

        .login-card h1 {
            font-size: 22px;
            font-weight: 700;
            color: #065f46;
            margin-bottom: 8px;
        }

        .login-card .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            color: #111827;
            background: #f9fafb;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #059669;
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.15);
            background: #ffffff;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #059669;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 50px;
        }

        .submit-btn:hover {
            background: #047857;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.35);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            box-shadow: none;
        }

        .submit-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .submit-btn.loading .spinner { display: inline-block; }
        .submit-btn.loading .btn-text { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 18px;
            display: none;
            text-align: left;
        }

        .success-box {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #065f46;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 18px;
            display: none;
            text-align: left;
        }

        .footer-links {
            margin-top: 24px;
            font-size: 13px;
            color: #6b7280;
        }

        .footer-links a {
            color: #059669;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #047857;
            text-decoration: underline;
        }

        .footer-links .separator {
            margin: 0 10px;
            color: #d1d5db;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .login-card {
                padding: 28px 20px;
            }

            .school-badge {
                width: 72px;
                height: 72px;
            }

            .login-card h1 {
                font-size: 19px;
            }

            .form-group input {
                padding: 10px 14px;
                font-size: 15px;
            }

            .submit-btn {
                padding: 12px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="/uploads/school-logo.png" alt="Saint Mary School Badge" class="school-badge"
             onerror="this.style.display='none'">

        <h1>Teacher &amp; Principal Login</h1>
        <p class="subtitle">Saint Mary School, Rajula</p>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@saintmary.edu" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="btn-text">Sign In</span>
                <span class="spinner"></span>
            </button>

            <div class="error-box" id="errorBox"></div>
            <div class="success-box" id="successBox"></div>
        </form>

        <div class="footer-links">
            <a href="/">Back to Home</a>
            <span class="separator">|</span>
            <a href="/admin">Admin? Click here</a>
        </div>
    </div>

    <script>
        (function () {
            var form = document.getElementById('loginForm');
            var emailInput = document.getElementById('email');
            var passwordInput = document.getElementById('password');
            var submitBtn = document.getElementById('submitBtn');
            var errorBox = document.getElementById('errorBox');
            var successBox = document.getElementById('successBox');

            function showError(message) {
                successBox.style.display = 'none';
                errorBox.textContent = message;
                errorBox.style.display = 'block';
            }

            function showSuccess(message) {
                errorBox.style.display = 'none';
                successBox.textContent = message;
                successBox.style.display = 'block';
            }

            function hideMessages() {
                errorBox.style.display = 'none';
                errorBox.textContent = '';
                successBox.style.display = 'none';
                successBox.textContent = '';
            }

            function setLoading(loading) {
                submitBtn.disabled = loading;
                if (loading) {
                    submitBtn.classList.add('loading');
                } else {
                    submitBtn.classList.remove('loading');
                }
            }

            // Timeout wrapper for fetch
            function fetchWithTimeout(url, options, timeout) {
                return new Promise(function (resolve, reject) {
                    var timer = setTimeout(function () {
                        reject(new Error('Request timed out. Please check your connection and try again.'));
                    }, timeout);

                    fetch(url, options)
                        .then(function (response) {
                            clearTimeout(timer);
                            resolve(response);
                        })
                        .catch(function (err) {
                            clearTimeout(timer);
                            reject(err);
                        });
                });
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                hideMessages();

                var email = emailInput.value.trim();
                var password = passwordInput.value;

                if (!email) {
                    showError('Please enter your email address.');
                    emailInput.focus();
                    return;
                }

                if (!password) {
                    showError('Please enter your password.');
                    passwordInput.focus();
                    return;
                }

                setLoading(true);

                fetchWithTimeout('/api/auth/user-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                }, 15000)
                .then(function (response) {
                    setLoading(false);
                    if (response.ok) {
                        showSuccess('Login successful! Redirecting to dashboard...');
                        setTimeout(function () {
                            window.location.href = '/dashboard';
                        }, 500);
                    } else {
                        // Try to parse error from response
                        return response.text().then(function (text) {
                            var data;
                            try {
                                data = JSON.parse(text);
                            } catch (e) {
                                throw new Error('Invalid email or password. Please try again.');
                            }
                            throw new Error(data.error || data.message || 'Invalid email or password. Please try again.');
                        });
                    }
                })
                .catch(function (err) {
                    setLoading(false);
                    var msg = err.message || 'An unexpected error occurred. Please try again.';
                    if (msg.indexOf('Failed to fetch') !== -1 || msg.indexOf('NetworkError') !== -1) {
                        msg = 'Network error. Please check your connection and try again.';
                    }
                    showError(msg);
                });
            });

            // Hide messages when user starts typing
            emailInput.addEventListener('input', hideMessages);
            passwordInput.addEventListener('input', hideMessages);
        })();
    </script>

</body>
</html>
